4.09,"finishTime":4.889},{"text":"it's very difficult to grow.","startTime":4.969,"finishTime":6.489},{"text":"Intentional leaders don't wait for annual reviews.","startTime":6.73,"finishTime":9.56},{"text":"They provide ongoing real-time feedback.","startTime":9.93,"finishTime":12.26},{"text":"That includes sharing what's working,","startTime":12.568999999999999,"finishTime":14.289},{"text":"what can improve,","startTime":14.409,"finishTime":15.39},{"text":"and creating space for open","startTime":15.489,"finishTime":17.149},{"text":"two-way conversations.","startTime":17.329,"finishTime":18.53}]}},"zMNJHErei6gvTxzF4":{"_id":"zMNJHErei6gvTxzF4","_siteID":"g7KiRFsys4vhsx3dA","data":{"attributes":{"type":"audio","mimetype":"audio/mpeg","status":"online","fileSizeInBytes":1181952,"uploadedFileName":"Alloy-en-WhatisIntentionalLeadership-552026.mp3","uploadedFileNameExtension":".mp3","duration":49.2125},"dates":{"dateCreated":"2026-05-05T18:21:08.298Z","dateModified":"2026-05-05T18:22:02.777Z"},"users":{"_userCreatorID":"xpAePQ3mCWbJ9zYyH","_userModifierID":"xpAePQ3mCWbJ9zYyH"}},"isBuiltin":false,"isSampleData":false,"isVisible":true,"workspaceId":"ScpqTofGheQCozvfg","source":"textToSpeech","textToSpeechData":{"prompt":"“Intentional leadership means leading with purpose, awareness, and consistency—not just reacting to what’s happening around you. It’s about being proactive: knowing the outcome you want, being aware of how you show up, and making decisions based on your values.\nFor example, instead of jumping in to solve a problem for your team, an intentional leader pauses and asks a few questions first—helping the team think it through and build capability, rather than creating dependency.\nIn a business context, this connects to the three employee rights. Your team needs to know what’s expected—like clear priorities. They need to know how they’re doing—through regular feedback. And they need to know how they can grow—through opportunities to build skills.\nIntentiona \"font-size:21px\">Development is not a &ldquo;nice to have&rdquo;&mdash;it&rsquo;s essential to performance and retention.\u003c/span>\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"font-size:21px\">\u003cspan style=\"color:#703dd6\">\u003cstrong>Leaders today need to get results through people, not just through their own effort.\u003c/strong>\u003c/span> That means developing employees intentionally.\u003c/span>\u003c/div>\n\n\u003cdiv>&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"font-size:21px\">Think about your own career: How did you build your skills? Who supported your growth? What did you wish you had more of?\u003c/span>\u003cbr />\n&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"font-size:21px\">\u003cstrong>Development should be:\u003c/strong>\u003cbr />\n&bull; Aligned to current performance and role expectations\u003cbr />\n&bull; A balance of short-term skill building and long-term growth\u003cbr />\n&bull; Grounded in reality&mdash;not just aspiration\u003c/span>\u003cbr />\n&nbsp;\u003c/div>\n\n\u003cdiv>\u003cspan style=\"font-size:21px\">Without intentional development, people can feel stuck, unclear, or disengaged.\u003c/span>\u003c/div>\n\u003c/div>\n\u003c/div>\n\u003c/div>\n\u003c/div>\n","identifier":"uYeQ2QvkQQht3aYGt","customStyle":{"verticalAlignment":"top","lineHeight":1.3,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fontColor":"rgba(0,0,0,1)","font":{"size":20,"bold":false,"italic":false,"underline":false},"type":"rectangle","fill":{"type":"color","color":"koantic(light1, 0, 0)"},"padding":{"left":0,"top":0,"bottom":0,"right":0},"textHeading":"normal"},"kind":"overlay","type":"rectangle","entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"start":0,"behaviorType":"continue","rotationAngle":0},{"identifi 003cdiv>\u003cbr />\n\u003cspan style=\"font-size:21px\">\u003cstrong>To develop employees more intentionally:\u003c/strong>\u003cbr />\n&bull; Use Experience &ndash; delegate meaningful work and stretch assignments\u003cbr />\n&bull; Provide Exposure &ndash; connect them to new people, projects, and perspectives\u003cbr />\n&bull; Offer Education &ndash; training, tools, and learning resources\u003c/span>\u003c/div>\n\n\u003cdiv>\u003cbr />\n\u003cspan style=\"font-size:21px\">\u003cstrong>Also:\u003c/strong>\u003cbr />\n&bull; Have regular conversations about growth&mdash;not just performance\u003cbr />\n&bull; Be clear and honest about what&rsquo;s required for the next step\u003cbr />\n&bull; Balance ambition with current performance expectations\u003cbr />\n&bull; Help employees build skills that support both their goals and the business\u003c/span>\u003c/div>\n\n\u003cdiv>\u003cbr />\n\u003cspan style=\"font-size:21px\">Development is most effective when it&rsquo;s ongoing, practical, and intentional.\u003c/span>\u003c/div>\n\u003c/div>\n","identifier":"uYeQ2QvkQQht3aYGt","customStyle":{"verticalAlignment":"top","lineHeight":1.3,"textAlignment":"left","border":{"color":"koantic(dark1, 0, 1)","size":0,"left":true,"top":true,"bottom":true,"right":true},"roundedCorners":{"topLeft":0,"topRight":0,"bottomLeft":0,"bottomRight":0},"fontColor":"rgba(0,0,0,1)","font":{"size":17,"bold":false,"italic":false,"underline":false},"type":"rectangle","fill":{"type":"color","color":"koantic(light1, 0, 0)"},"padding":{"left":0,"top":0,"bottom":0,"right":0}},"kind":"overlay","type":"rectangle","entranceAnimation":{"type":"fadeIn","duration":500},"exitAnimation":{"type":"fadeOut","duration":500},"start":0,"behaviorType":"continue","rotationAngle":0},{"identifier":"SivSTzE2B6LwgdFYD","kind":"group","overlays":[{"x":901,"y":214.90268242411662,"width":219.83604936807097,"height":219.83604936807095,"isRatioFixed":true,"rotationAngle":0,"customStyle":{"roundedCorners":{"topLeft":5,"top
